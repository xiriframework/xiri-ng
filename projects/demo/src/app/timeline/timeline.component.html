<div class="xcontainer-fluid">

	<!-- Breadcrumb -->
	<div class="xrow">
		<div class="xcol">
			<xiri-breadcrumb [settings]="breadcrumbs"></xiri-breadcrumb>
		</div>
	</div>

	<!-- Seitenkopf -->
	<div class="xrow">
		<div class="xcol">
			<xiri-page-header [settings]="pageHeaderIntro"></xiri-page-header>
		</div>
	</div>

	<!-- Activity Log -->
	<div class="xrow">
		<div class="xcol">
			<xiri-section [settings]="sectionActivityLog">
				<div class="xrow">
					<div class="xcol-md-6">
						<xiri-timeline [settings]="activityTimeline"></xiri-timeline>
					</div>
					<div class="xcol-md-6">
						<app-go-code [code]="goActivityCode" title="Go: timeline"></app-go-code>
					</div>
				</div>
			</xiri-section>
		</div>
	</div>

	<!-- Order Status -->
	<div class="xrow">
		<div class="xcol">
			<xiri-section [settings]="sectionOrderStatus">
				<div class="xrow">
					<div class="xcol-md-6">
						<xiri-timeline [settings]="statusTimeline"></xiri-timeline>
					</div>
					<div class="xcol-md-6">
						<app-go-code [code]="goOrderCode" title="Go: timeline (compact)"></app-go-code>
					</div>
				</div>
			</xiri-section>
		</div>
	</div>

	<!-- Simple Steps -->
	<div class="xrow">
		<div class="xcol">
			<xiri-section [settings]="sectionSimpleSteps">
				<div class="xrow">
					<div class="xcol-md-6">
						<xiri-timeline [settings]="simpleTimeline"></xiri-timeline>
					</div>
					<div class="xcol-md-6">
						<app-go-code [code]="goSimpleCode" title="Go: timeline (minimal)"></app-go-code>
					</div>
				</div>
			</xiri-section>
		</div>
	</div>

</div>
