<input matInput [formControl]="dateControl" class="date" [required]="required"
       [min]="minDate" [max]="maxDate" [matDatepicker]="picker">

<mat-datepicker-toggle matIconSuffix [for]="picker">
	<mat-icon matDatepickerToggleIcon>today</mat-icon>
</mat-datepicker-toggle>
<mat-datepicker #picker startView="multi-year" (monthSelected)="onYearMonthSelected($event)"></mat-datepicker>
