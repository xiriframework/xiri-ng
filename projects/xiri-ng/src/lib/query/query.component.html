<div class="xrow">
	<div class="xcol">
		@if (settings().collapsed !== undefined) {
			<mat-expansion-panel [expanded]="!settings().collapsed" class="query-expansion">
				<mat-expansion-panel-header>
					<mat-panel-title>
						<mat-icon>filter_list</mat-icon> Filter
					</mat-panel-title>
				</mat-expansion-panel-header>
				<div class="query">
					<xiri-form-fields [form]="formFields()" (formChange)="formChanged($event)" display="line"></xiri-form-fields>
					@if (error()) {
						<div class="error">
							<span>{{ error() }}</span>
							<button mat-button type="button" data-testid="query-retry" (click)="retry()">
								<mat-icon>refresh</mat-icon> Retry
							</button>
						</div>
					}
				</div>
			</mat-expansion-panel>
		} @else {
			<div class="query">
				<xiri-form-fields [form]="formFields()" (formChange)="formChanged($event)" display="line"></xiri-form-fields>
				@if (error()) {
					<div class="error">
						<span>{{ error() }}</span>
						<button mat-button type="button" data-testid="query-retry" (click)="retry()">
							<mat-icon>refresh</mat-icon> Retry
						</button>
					</div>
				}
			</div>
		}
	</div>
	@if (settings().buttonline; as buttonline) {
		<div class="xcol formbtnline" [class]="buttonline.display">
			<xiri-buttonline [settings]="$any(buttonline.data)" [filterData]="filterData()" [disabled]="!formValid()"
			                 (result)="clickedButton($event)"></xiri-buttonline>
		</div>
		@if (loading()) {
			<div class="xcol">
				<mat-spinner diameter="30"></mat-spinner>
			</div>
		}
	}
	@if (dynData.data) {
		<div class="xcol">
			<ng-container *ngTemplateOutlet="dyncomponent(); context: { $implicit: dynData }"></ng-container>
		</div>
	}
	@if (data()) {
		<div class="xcol" [class.is-loading]="loading()">
			<ng-container *ngTemplateOutlet="dyncomponent(); context: { $implicit: data() }"></ng-container>
		</div>
	}
</div>
